<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สร้าง QR พร้อมเพย์ | Promptpay QR Code Generator</title>
  <meta name="description" content="สร้าง QR Code พร้อมเพย์ พร้อมระบุจำนวนเงิน สำหรับสแกนจ่ายเงิน สร้างคิวอาร์โค้ด" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <div class="browser-shell">
      <section class="stage" aria-label="QR Code">
        <div class="panel" id="panel">
          <div class="content">
            <h1 class="edit-title" id="edit-title">สร้าง QR พร้อมเพย์</h1>

            <div class="qr-wrap">
              <div id="qrcode">
                <div class="qr-placeholder"></div>
              </div>
            </div>

            <div class="info display-fields">
              <div class="display-id" id="display-id"></div>
              <div class="display-amount small" id="display-amount"></div>
              <div class="display-generic" id="display-generic" hidden></div>
            </div>

            <form class="info edit-fields" id="payment-form" novalidate>
              <div class="field-group" id="promptpay-fields">
                <input id="promptpay-id" name="id" type="text" inputmode="numeric" autocomplete="off" pattern="[0-9]*" placeholder="เบอร์โทร/เลขประชาชน/ผู้เสียภาษี/e-Wallet" aria-label="หมายเลขโทรศัพท์มือถือ หรือ เลขประจำตัวประชาชน หรือ เลขประจำตัวผู้เสียภาษี หรือ หมายเลข e-Wallet">
                <input id="amount" name="amount" type="text" inputmode="decimal" autocomplete="off" placeholder="จำนวนเงิน (เว้นว่างได้)" aria-label="จำนวนเงิน (เว้นว่างได้)">
              </div>
              <div class="field-group" id="generic-fields" hidden>
                <textarea id="generic-text" name="text" autocomplete="off" maxlength="300" placeholder="ป้อนข้อความหรือ URL (สูงสุด 300 ตัวอักษร)" aria-label="ป้อนข้อความหรือ URL (สูงสุด 300 ตัวอักษร)"></textarea>
              </div>
              <div class="error" id="error" aria-live="polite"></div>
            </form>
          </div>

          <div class="actions" aria-label="เครื่องมือ">
            <button class="view-action" id="download-qr" type="button" aria-label="ดาวน์โหลด QR" title="ดาวน์โหลด QR" disabled>
              <img alt="" src="https://cdn.jsdelivr.net/npm/lucide-static@1.17.0/icons/download.svg">
            </button>
            <button class="view-action" id="share-button" type="button" aria-label="แบ่งปัน QR" title="แบ่งปัน QR" disabled>
              <img alt="" src="https://cdn.jsdelivr.net/npm/lucide-static@1.17.0/icons/share-2.svg">
            </button>
            <button class="view-action" id="copy-link" type="button" aria-label="คัดลอกลิงก์หน้านี้" title="คัดลอกลิงก์หน้านี้" disabled>
              <img alt="" src="https://cdn.jsdelivr.net/npm/lucide-static@1.17.0/icons/link.svg">
            </button>
            <button class="mode-toggle type-button" id="promptpay-type-button" type="button" aria-label="QR พร้อมเพย์" title="QR พร้อมเพย์">
              <img alt="" src="assets/icons/thai-qr-payment-icon-bw.svg">
            </button>
            <button class="mode-toggle type-button" id="generic-type-button" type="button" aria-label="QR ทั่วไป" title="QR ทั่วไป">
              <img alt="" src="https://cdn.jsdelivr.net/npm/lucide-static@1.17.0/icons/type.svg">
            </button>
            <button id="mode-button" type="button" aria-label="แก้ไข" title="แก้ไข">
              <img id="mode-icon" alt="" src="https://cdn.jsdelivr.net/npm/lucide-static@1.17.0/icons/pencil.svg">
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>
  <a class="source-link" href="https://github.com/lazywasabi/qr-gen" target="_blank" rel="noopener noreferrer">lazywasabi/qr-gen</a>

  <script defer src="assets/qrcodegen.min.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
